<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">TeknoParrot Tools</title>
  <desc id="desc">An angular tech parrot head badge for the HyperHQ TeknoParrot plugin.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="70%">
      <stop offset="0" stop-color="#0E7490" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#06111F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="head" x1="40" y1="40" x2="190" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
  </defs>

  <rect width="256" height="256" rx="40" fill="#06111F"/>
  <circle cx="128" cy="118" r="120" fill="url(#glow)"/>

  <!-- Crest, angular spikes behind the head -->
  <path d="M70 78 L48 26 L86 58 Z" fill="#F97316"/>
  <path d="M92 58 L82 14 L112 46 Z" fill="#FACC15"/>
  <path d="M116 50 L116 10 L138 42 Z" fill="#22C55E"/>

  <!-- Angular parrot head, facing right: steep forehead, single jaw facet, hooked beak -->
  <path d="M68 86
           L100 46
           L138 46
           L168 70
           L182 78
           L176 104
           L196 118
           L178 134
           L168 168
           L140 196
           L108 206
           L96 178
           L70 168
           L58 132
           Z"
        fill="url(#head)"/>

  <!-- Beak: clean hooked triangle pointing right/down -->
  <path d="M182 78 L222 100 L196 118 L168 96 Z" fill="#FACC15"/>
  <path d="M196 118 L222 100 L210 122 Z" fill="#F59E0B"/>

  <!-- Eye -->
  <path d="M148 84 L166 80 L168 96 L150 100 Z" fill="#06111F"/>
  <circle cx="160" cy="88" r="3.5" fill="#E0F2FE"/>

  <!-- Jaw/cheek facet line for the angular "tech" look -->
  <path d="M100 46 L96 110 L70 168" stroke="#0E7490" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M138 46 L150 100 L140 196" stroke="#0E7490" stroke-width="3" fill="none" opacity="0.6"/>

  <!-- Circuit accents along the neck -->
  <path d="M96 178 L108 206" stroke="#5EEAD4" stroke-width="3" fill="none" opacity="0.85"/>
  <circle cx="96" cy="178" r="3.5" fill="#5EEAD4"/>
  <circle cx="108" cy="206" r="3.5" fill="#5EEAD4"/>
</svg>
