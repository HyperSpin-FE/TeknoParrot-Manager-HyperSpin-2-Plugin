<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">TeknoParrot Tools</title>
  <desc id="desc">Banner: an angular tech parrot head with the TeknoParrot Tools wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#06111F"/>
    </linearGradient>
    <radialGradient id="glow" cx="14%" cy="42%" r="40%">
      <stop offset="0" stop-color="#0E7490" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#06111F" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="head" x1="40" y1="40" x2="190" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.55" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
    <linearGradient id="title-fill" x1="260" y1="100" x2="900" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67E8F9"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <circle cx="170" cy="126" r="170" fill="url(#glow)"/>

  <!-- Parrot mascot, same artwork as icon.svg, scaled and positioned left -->
  <g transform="translate(20,18) scale(0.95)">
    <path d="M70 78 L48 26 L86 58 Z" fill="#F97316"/>
    <path d="M92 58 L82 14 L112 46 Z" fill="#FACC15"/>
    <path d="M116 50 L116 10 L138 42 Z" fill="#22C55E"/>

    <path d="M68 86
             L100 46
             L138 46
             L168 70
             L182 78
             L176 104
             L196 118
             L178 134
             L168 168
             L140 196
             L108 206
             L96 178
             L70 168
             L58 132
             Z"
          fill="url(#head)"/>

    <path d="M182 78 L222 100 L196 118 L168 96 Z" fill="#FACC15"/>
    <path d="M196 118 L222 100 L210 122 Z" fill="#F59E0B"/>

    <path d="M148 84 L166 80 L168 96 L150 100 Z" fill="#06111F"/>
    <circle cx="160" cy="88" r="3.5" fill="#E0F2FE"/>

    <path d="M100 46 L96 110 L70 168" stroke="#0E7490" stroke-width="3" fill="none" opacity="0.6"/>
    <path d="M138 46 L150 100 L140 196" stroke="#0E7490" stroke-width="3" fill="none" opacity="0.6"/>

    <path d="M96 178 L108 206" stroke="#5EEAD4" stroke-width="3" fill="none" opacity="0.85"/>
    <circle cx="96" cy="178" r="3.5" fill="#5EEAD4"/>
    <circle cx="108" cy="206" r="3.5" fill="#5EEAD4"/>
  </g>

  <!-- Wordmark -->
  <text x="280" y="150" font-family="Segoe UI, Verdana, sans-serif" font-size="68" font-weight="800" letter-spacing="1" fill="url(#title-fill)">TEKNOPARROT</text>
  <text x="282" y="196" font-family="Segoe UI, Verdana, sans-serif" font-size="36" font-weight="700" letter-spacing="4" fill="#F472B6">TOOLS</text>
  <text x="282" y="230" font-family="Segoe UI, Verdana, sans-serif" font-size="20" fill="#94A3B8">HyperSpin 2 / HyperHQ plugin for TeknoParrot profile maintenance and import</text>

  <!-- Accent rule -->
  <rect x="282" y="244" width="600" height="3" rx="1.5" fill="#1E293B"/>
  <circle cx="282" cy="245" r="3.5" fill="#F97316"/>
  <circle cx="302" cy="245" r="3.5" fill="#FACC15"/>
  <circle cx="322" cy="245" r="3.5" fill="#22C55E"/>
</svg>
